<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        body{
            height: 97vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button{
            height: 100px;
            width: 300px;
            background-color: black;
            color: white;
            font-size: x-large;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    
    <button onclick="updator()"> Change BackgroundColor</button>
</body>

<script>

    let x=0
    function updator(){
        // document.body.style.backgroundColor = "blue";
        
        color = ["blue","green","pink","red","white","yellow","purple"];
        if(x == color.length) x = 0;
        document.body.style.backgroundColor = color[x++];
    }

</script>
</html>
