<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #box{
        height: 80px;
        width: 80px;
        background-color: aqua;
        position: absolute;
        top: 100px;
        left: 100px;
        margin: 20px;
    }
    
</style>
<body>
    
    <button onclick="Increase()">Increase</button><br>
    <button onclick="Decrease()">decrease</button><br>
    <div id="box"></div>
</body>

<script>

    let box = document.getElementById("box")
    let size = 1

    function Increase(){

        interval = setInterval(()=>{
            box.style.transform = `scale(${size})`
            size += 0.1
    
            console.log(size)

            if(size > 2){
                clearInterval(interval)
            }
        },100);
    }

    function Decrease(){

        interval = setInterval(()=>{
            box.style.transform = `scale(${size})`
            size -= 0.1
    
            console.log(size)

            if(size < 0.5){
                clearInterval(interval)
            }
        },100);
    }

</script>
</html>
