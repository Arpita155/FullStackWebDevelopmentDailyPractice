<script>
    // y=document.createElement("h1")

    function update(){
        let head1 = document.getElementById("inp").value
        document.getElementById("head").textContent = head1
    }

    //Traversal
    let fdiv = document.getElementById("maindiv")

    fdiv.firstElementChild.textContent ="hi this is arpita"
    fdiv.lastElementChild.textContent = "bye bye"

    let head1 = document.getElementById("hi")

    head1.previousElementSibling.textContent = "hello world"

    console.log(head1.parentElement)
    console.log(head1.nextElementSibling.textContent)

    fdiv.children[0].textContent = "welcome back"   // children performs as an array
