<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    button{
        height: 70px;
        width: 70px;
        background-color: grey;
        border-radius: 5px;
        margin-right: 4px;
    }
    button:hover{
        outline: 2px solid black;
    }
</style>
<body>
    
    <div id="box">

    </div>
</body>

<script>
    
    let box = document.getElementById("box")

    let interval = null
    let curr = null
    let last = null


    function Ready(){
        for(let i=1;i<10;i++){
            box.innerHTML += `<button onclick="check(${i-1})" class="btn">${i}</button>`
        }

        interval = setInterval(()=>{
            let idx = Math.floor(Math.random()*9)
            let elements = document.getElementsByClassName("btn")
            if(last != null) last.style.backgroundColor = "grey"
            curr = elements[idx]
            curr.style.backgroundColor = "green"
            last = curr
        },1000)
    }
    Ready()

    function check(idx){
        console.log(document.getElementsByClassName("btn")[idx])
        if(document.getElementsByClassName("btn")[idx]==curr){
            clearInterval(interval)
            box.innerHTML = `<h2>Congratulations!! </h2>  <button onclick="Restart()">play again<?button>`
        }
        
    }

    function Restart(){
        box.innerHTML=""
        Ready()
    }

</script>
</html>
