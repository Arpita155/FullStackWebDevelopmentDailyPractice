<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1 id="dm">DOM -- > Document Object Model</h1>

    <!-- Ex1 of DOM-->
    <h2 id = "abc">Hello</h2>
    <button onclick="update()">Modify</button><br><br><br>

    <!-- Ex2 -->
    <div>
        Fruit : <span id="fruit">Mango</span><br>
        <button onclick="update1()">Edit</button>
        <br><br>
        <div>
            <input type="text" id="name" placeholder="Enter name">
            <input type="text" id="age" placeholder="Enter age">
            <input type="text" id="class" placeholder="Enter class"><br>
            <button onclick="ADD()">Add all data</button>
        </div>
    </div>


</body>
<script>
    //  show document
    console.log(document)  
    let heading = document.getElementById("dm")
    console.log(heading.innerText)

    // Change title name using Js
    document.title = "Arpita"     
    

    // EX1
    function update(){
        document.getElementById("abc").innerHTML = "Bye"
    }


    // Ex2
    let fruit = document.getElementById("fruit")
    function update1(){
        let x = prompt("Enter fruit name ")
        fruit.innerHTML = x;
    }

    function ADD(){
        let Name = document.getElementById("name").value
        let Age = document.getElementById("age").value
        let Class = document.getElementById("class").value
        console.log("new user added !")
        console.log("name added : "+Name)
        console.log("age added : "+Age)
        console.log("class added : "+Class)
    }

</script>
