<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
        padding: 0;
    }
    header{
        margin: 0;
        padding: 0;
        background-color: rgb(60, 60, 80);
    }
    .hdiv1{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .hdiv2{
        width: 42vw;
        margin-left: 50px;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        #h31{
            color: rgb(67, 233, 248);
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif ;
        }
        #p1{
            color: rgb(67, 233, 248);
            font-weight: lighter;
        }
    }
    .hdiv3{
        width: 40vw;
        display: flex;
        justify-content: right;
        align-items: center;
        margin-right: 47px;
        
    }
    .hdiv31{
        display: flex;
        gap: 20px;
        justify-content: space-around;
        align-items: center;
        margin-right: 20px;
    }
    .hd1{
        height: 40px;
        width: 300px;
        background-color: black;
        border-radius: 10px;
        color: rgb(165, 163, 159);
        font-weight: lighter;
        display: flex;
        justify-content: left;
        align-items: center;
    }
    .hd2{
        height: 34px;
        width: 130px;
        background-color: rgb(37, 244, 248);
        border-radius: 8px;
        /* background-image:linear-gradient(white,rgb(100, 192, 211)) ; */
        color: white;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .hd3{
        height: 34px;
        width: 50px;
        background-color: rgb(104, 104, 110);
        border: 3px solid rgb(177, 168, 168);
        border-radius: 12px;
    }
    .maindiv{
        height: 600px;
        width: 100vw;
        /* background-color: rgb(55, 52, 76); */
        background-image: radial-gradient(rgb(125, 104, 181),rgb(123, 141, 172));
        color: white;
        font-size: xx-large;
        span{
            color: aqua;
        }
    }
    .bt1{
        margin-right: 400px;
        height: 30px;
        width: 90px;
        border: none;
        border-radius: 5px;
        background-color: rgb(101, 98, 98);
        color: white;
    }
</style>
<body>
    
    <header>
        <div class="hdiv1">
            <div class="hdiv2">
                <h3 id="h31">NexWork</h3>
                <p id="p1"><u>Discover</u></p>
                <p>Opportunities</p>
                <p>Messenger</p>
                <p>Assessments</p>
            </div>
            <div class="hdiv3">
                <div class="hdiv31">
                    <span class="hd1"><p><span>&nbsp;&nbsp; &#128269</span>  &nbsp;&nbsp;&nbsp;&nbsp;Search roles...</p></span>
                    <button class="hd2">Post a Job</button>
                    <button class="hd3">man</button>
                </div>
                
            </div>
        </div>
    </header>

    <div class="maindiv">
        <center>
            <br><br><button class="bt1">DESIGN</button>
            <h1>FIND WORK THAT<br>
            <span>MOVES THE WORLD</span></h1>
        </center>
        
    </div>

</body>
</html>
