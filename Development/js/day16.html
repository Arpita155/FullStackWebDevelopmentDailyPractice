<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="xyz">hi </h2>

    <div class="abc">div1</div>
    <div class="abc">div2</div>
    <div class="abc">div3</div>

    <h1 id="h1tag">this is h1 tag</h1>
    <p>uigh</p>
    <div>abc</div>
    <div>pqr</div>
    <div>xyz</div>

</body>
<script>
    // By Id ( getElementById )
    document.getElementById("xyz").innerHTML = "This is from h2"

    // By Class Name (getElementsByClassName)
    document.getElementsByClassName("abc")[0].innerHTML ="my first div"

    let elements = document.getElementsByClassName("abc")[1].innerHTML
    console.log(elements)

    // By tag Name (getElementsByTagName)
    for(let x of document.getElementsByTagName("div")){
        console.log(x)
    }

    // By querySelector
    console.log(document.querySelector("div").innerHTML)
    document.querySelector("#h1tag").innerHTML = "Bye"    // it change hi to Bye
</script>
</html>
